name: driver_app
description: Store delivery driver app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  shared_preferences: ^2.2.3
  geolocator: ^12.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.2.5
  signalr_netcore: ^1.3.5
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.1
  flutter_foreground_task: ^6.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo_app_driver.png"
  adaptive_icon_background: "#FFD700"
  adaptive_icon_foreground: "assets/images/logo_app_driver.png"
