version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: restaurant-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: srds
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Admin Dashboard Backend
  admindashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-admin
    ports:
      - "8080:8080"
    environment:
      # Database
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=srds;User=root;Password=$${DB_PASSWORD:-changeme};Allow User Variables=true;SslMode=None;CharSet=utf8mb4;TreatTinyAsBoolean=true;

      # Security
      - Security__AdminApiKey=$${ADMIN_API_KEY:-CHANGE_ME_IN_PRODUCTION}
      - Security__DriverTokenSecret=$${DRIVER_TOKEN_SECRET:-CHANGE_ME_IN_PRODUCTION}
      - Security__DriverTokenMinutes=1440

      # Initial Admin
      - InitialAdmin__Email=$${ADMIN_EMAIL:-admin@example.com}
      - InitialAdmin__Password=$${ADMIN_PASSWORD:-ChangeMe123!}

      # CORS
      - Cors__AllowedOrigins__0=$${ALLOWED_ORIGIN:-https://yourdomain.com}

      # Firebase
      - Firebase__ServiceAccountPath=/app/firebase-service-account.json

      # ASP.NET Core
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_RUNNING_IN_CONTAINER=true

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - restaurant-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped

networks:
  restaurant-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
